<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Curriculum Manager | PrepShare Admin</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        /* Custom scrollbar utility */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pl-64 transition-colors duration-300">

    <!-- Admin Sidebar Component -->
    <admin-sidebar></admin-sidebar>

    <!-- Main Workspace Content -->
    <main class="p-8 max-w-7xl mx-auto">
        <!-- Top Application Header -->
        <header class="flex justify-between items-center mb-10">
            <div class="space-y-1">
                <h1 class="font-headline-lg text-3xl font-extrabold tracking-tight text-primary">Admin Control Center</h1>
                <p class="text-sm text-on-surface-variant">Manage database resources, verify payments, and curate course structures.</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="px-3 py-1 rounded-full bg-primary/10 text-primary font-bold text-xs">PRODUCTION SERVER</span>
            </div>
        </header>

        <!-- Stats Grid -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-5 rounded-2xl border border-border-border-light shadow-sm hover:shadow transition-shadow">
                <p class="text-on-surface-variant font-label-md text-xs uppercase tracking-wider font-bold mb-1">Total Students</p>
                <h3 class="font-headline-md text-2xl text-primary font-extrabold" id="stat-total-students">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-border-light shadow-sm hover:shadow transition-shadow">
                <p class="text-on-surface-variant font-label-md text-xs uppercase tracking-wider font-bold mb-1">Active Premium</p>
                <h3 class="font-headline-md text-2xl text-success font-extrabold" id="stat-active-students">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-border-light shadow-sm hover:shadow transition-shadow">
                <p class="text-on-surface-variant font-label-md text-xs uppercase tracking-wider font-bold mb-1">Pending Requests</p>
                <h3 class="font-headline-md text-2xl text-pending font-extrabold animate-pulse" id="stat-pending">0</h3>
            </div>
        </section>

        <!-- PANEL: Course Curriculum Manager -->
        <div id="panel-curriculum" class="space-y-6">
            <div class="bg-white p-6 rounded-2xl border border-border-light shadow-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div class="space-y-1">
                    <h3 class="font-title-lg text-title-lg text-primary font-bold">Course Curriculum Management</h3>
                    <p class="text-xs text-on-surface-variant">Create, update, and soft-delete modules and lessons dynamically.</p>
                </div>
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <select id="curr-course-selector" class="bg-surface-subtle border border-border-light rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary outline-none text-primary font-bold">
                        <!-- Populated dynamically -->
                    </select>
                    <button id="add-module-btn" class="bg-primary text-white font-bold px-4 py-2 rounded-lg shadow hover:opacity-90 active:scale-95 transition-all text-sm flex items-center gap-2 shrink-0">
                        <span class="material-symbols-outlined text-sm">add</span> Add Module
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl border border-border-light shadow-sm">
                <div class="space-y-4" id="curriculum-tree-container">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </div>
    </main>

    <!-- Curriculum Item Editor Modal Overlay -->
    <div id="curriculum-modal" class="fixed inset-0 bg-[#021541]/75 backdrop-blur-sm hidden items-center justify-center z-[160] p-4">
        <div class="bg-white rounded-2xl overflow-hidden max-w-lg w-full shadow-2xl border border-border-light flex flex-col animate-slide-up">
            <div class="p-4 bg-surface-subtle border-b border-border-light flex justify-between items-center">
                <h3 class="font-bold text-primary" id="curriculum-modal-title">Add/Edit Curriculum Item</h3>
                <button class="material-symbols-outlined p-1 rounded-lg hover:bg-surface-container text-on-surface-variant outline-none" id="close-curriculum-modal-btn">close</button>
            </div>
            <form id="curriculum-form" class="p-6 space-y-4">
                <input type="hidden" id="curr-id"/>
                <input type="hidden" id="curr-type"/> <!-- 'module' or 'lesson' -->
                <input type="hidden" id="curr-course-id"/>
                <input type="hidden" id="curr-module-id"/>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-on-surface-variant uppercase">Title</label>
                    <input type="text" id="curr-title" required class="w-full border border-border-light rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary outline-none"/>
                </div>

                <div class="grid grid-cols-2 gap-4" id="lesson-fields-row-1">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase">YouTube Video Link / ID</label>
                        <input type="text" id="curr-yt-id" placeholder="e.g. https://youtu.be/... or ID" class="w-full border border-border-light rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary outline-none"/>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase">Duration (Seconds)</label>
                        <input type="number" id="curr-duration" class="w-full border border-border-light rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary outline-none"/>
                    </div>
                </div>

                <div class="space-y-1" id="lesson-fields-row-2">
                    <label class="text-xs font-bold text-on-surface-variant uppercase">Description</label>
                    <textarea id="curr-desc" rows="2" class="w-full border border-border-light rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary outline-none"></textarea>
                </div>

                <div class="space-y-1" id="lesson-fields-row-pdf">
                    <label class="text-xs font-bold text-on-surface-variant uppercase">PDF / Resource Link</label>
                    <input type="text" id="curr-pdf-link" placeholder="e.g. https://example.com/notes.pdf" class="w-full border border-border-light rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary outline-none"/>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase">Order Index</label>
                        <input type="number" id="curr-order" required class="w-full border border-border-light rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary outline-none"/>
                    </div>
                    <div class="flex items-center gap-2 pt-6" id="lesson-fields-preview">
                        <input type="checkbox" id="curr-preview" class="rounded border-border-light text-primary focus:ring-primary h-4 w-4"/>
                        <label for="curr-preview" class="text-xs font-bold text-on-surface-variant">Free Preview Lesson</label>
                    </div>
                </div>

                <div class="p-4 border-t border-border-light flex justify-end gap-3 pt-4">
                    <button type="button" id="cancel-curriculum-btn" class="px-5 py-2 rounded-lg border border-border-light text-on-surface-variant hover:bg-surface-subtle font-bold text-sm transition-colors">Cancel</button>
                    <button type="submit" class="px-5 py-2 rounded-lg bg-primary text-white hover:opacity-90 font-bold text-sm shadow-md transition-all">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Core Configurations & JS -->
    <script src="js/config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-service.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>

    <script>
        // Check Admin Authorization
        (function() {
            const currentUser = window.FirebaseService.getCurrentUser();
            if (!currentUser || currentUser.role !== 'admin') {
                alert("Access Denied: Admin privileges are required to view the management console.");
                window.location.href = "index.html";
                return;
            }
        })();

        // Realtime stats listener
        const statPending = document.getElementById('stat-pending');
        const statTotal = document.getElementById('stat-total-students');
        const statActive = document.getElementById('stat-active-students');

        window.FirebaseService.getMetrics((metrics) => {
            statTotal.innerText = metrics.totalStudents;
            statActive.innerText = metrics.activeStudents;
            statPending.innerText = metrics.pendingCount;
        });

        // --- CURRICULUM MANAGEMENT LOGIC ---
        let activeCourseId = "course-placement";

        const loadCurriculumManager = async () => {
            const courses = await window.FirebaseService.getCourses();
            const select = document.getElementById('course-selector');
            select.innerHTML = courses.map(c => `<option value="${c.id}">${c.title}</option>`).join('');
            
            if (courses.length > 0) {
                activeCourseId = courses[0].id;
                select.value = activeCourseId;
                renderCurriculumTree();
            }

            select.addEventListener('change', (e) => {
                activeCourseId = e.target.value;
                renderCurriculumTree();
            });
        };

        const renderCurriculumTree = async () => {
            const { modules, lessons } = await window.FirebaseService.getSyllabus(activeCourseId);
            const container = document.getElementById('curriculum-tree');
            
            if (modules.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10 bg-white border border-border-light rounded-2xl">
                        <span class="material-symbols-outlined text-4xl text-on-surface-variant mb-2">menu_book</span>
                        <p class="text-sm font-semibold text-[#808090]">No curriculum modules created yet.</p>
                        <p class="text-xs text-on-surface-variant mt-1">Click Add Module to begin building the syllabus.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = modules.map((mod, mIdx) => {
                const modLessons = lessons.filter(l => l.moduleId === mod.id && !l.isDeleted);
                modLessons.sort((a,b) => a.order - b.order);
                
                return `
                    <div class="bg-white border border-border-light rounded-2xl overflow-hidden shadow-sm">
                        <div class="p-4 bg-surface-subtle border-b border-border-light flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                            <div>
                                <span class="font-mono text-xs text-secondary font-bold uppercase bg-secondary-container/10 px-2 py-0.5 rounded">Module ${mIdx + 1}</span>
                                <h4 class="font-bold text-primary text-sm mt-1">${mod.title}</h4>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="openCurriculumEditor('module', '${mod.id}', '', '${mod.title}', ${mod.order})" class="px-2.5 py-1 text-xs border border-border-light rounded hover:bg-surface font-semibold flex items-center gap-1">
                                    <span class="material-symbols-outlined text-[14px]">edit</span> Edit
                                </button>
                                <button onclick="deleteCurriculumItem('module', '${mod.id}')" class="px-2.5 py-1 text-xs border border-error/30 text-error rounded hover:bg-error/5 font-semibold flex items-center gap-1">
                                    <span class="material-symbols-outlined text-[14px]">delete</span> Delete
                                </button>
                                <button onclick="openCurriculumEditor('lesson', '', '${mod.id}', '', ${modLessons.length + 1})" class="px-2.5 py-1 text-xs bg-primary text-white rounded hover:opacity-90 font-semibold flex items-center gap-1">
                                    <span class="material-symbols-outlined text-[14px]">add</span> Add Lesson
                                </button>
                            </div>
                        </div>
                        
                        <div class="divide-y divide-border-light">
                            ${modLessons.length === 0 ? `
                                <p class="text-xs text-on-surface-variant italic p-4 text-center">No lessons added to this module yet.</p>
                            ` : modLessons.map((les, lIdx) => {
                                const youtubeVal = les.youtubeVideoId || les.youtubeId || '';
                                const pdfVal = les.resources && les.resources.length > 0 ? les.resources[0] : '';
                                return `
                                <div class="p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 bg-white hover:bg-slate-50/50 transition-colors">
                                    <div class="space-y-1">
                                        <div class="flex items-center gap-2">
                                            <span class="font-bold text-primary text-xs">${mIdx + 1}.${lIdx + 1} ${les.title}</span>
                                            ${les.isFreePreview || les.isPreview ? `<span class="px-1.5 py-0.5 rounded text-[8px] bg-success/10 text-success font-bold">PREVIEWABLE</span>` : ''}
                                        </div>
                                        <p class="text-[10px] text-on-surface-variant">${les.description || 'No description provided.'}</p>
                                        <p class="text-[9px] text-on-surface-variant font-mono uppercase">YT: ${youtubeVal} ${pdfVal ? `• PDF: ${pdfVal}` : ''} • ${Math.floor(les.durationSeconds / 60)}m ${les.durationSeconds % 60}s</p>
                                    </div>
                                    <div class="flex items-center gap-2 shrink-0">
                                        <button onclick="openCurriculumEditor('lesson', '${les.id}', '${mod.id}', '${les.title.replace(/'/g, "\\'")}', ${les.order}, '${youtubeVal}', ${les.durationSeconds}, '${(les.description || '').replace(/'/g, "\\'")}', ${les.isFreePreview || les.isPreview || false}, '${pdfVal}')" class="px-2 py-1 text-[10px] border border-border-light rounded hover:bg-surface font-semibold flex items-center gap-1">
                                            <span class="material-symbols-outlined text-[12px]">edit</span> Edit
                                        </button>
                                        <button onclick="deleteCurriculumItem('lesson', '${les.id}')" class="px-2 py-1 text-[10px] border border-error/30 text-error rounded hover:bg-error/5 font-semibold flex items-center gap-1">
                                            <span class="material-symbols-outlined text-[12px]">delete</span> Delete
                                        </button>
                                    </div>
                                </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        };

        // Modals elements
        const currModal = document.getElementById('curriculum-modal');
        const currForm = document.getElementById('curriculum-form');
        const currId = document.getElementById('curr-id');
        const currType = document.getElementById('curr-type');
        const currCourseId = document.getElementById('curr-course-id');
        const currModuleId = document.getElementById('curr-module-id');
        const currTitle = document.getElementById('curr-title');
        const currYt = document.getElementById('curr-yt-id');
        const currDuration = document.getElementById('curr-duration');
        const currDesc = document.getElementById('curr-desc');
        const currPdf = document.getElementById('curr-pdf-link');
        const currOrder = document.getElementById('curr-order');
        const currPreview = document.getElementById('curr-preview');
        
        const closeCurrModal = document.getElementById('close-curriculum-modal-btn');
        const cancelCurrBtn = document.getElementById('cancel-curriculum-btn');

        window.openCurriculumEditor = (type, itemId = '', modId = '', title = '', orderVal = 1, ytId = '', duration = 0, desc = '', isPreview = false, pdfLink = '') => {
            currId.value = itemId;
            currType.value = type;
            currCourseId.value = activeCourseId;
            currModuleId.value = modId;
            currTitle.value = title;
            currOrder.value = orderVal;
            
            const ytRow = document.getElementById('lesson-fields-row-1');
            const descRow = document.getElementById('lesson-fields-row-2');
            const pdfRow = document.getElementById('lesson-fields-row-pdf');
            const previewBox = document.getElementById('lesson-fields-preview');

            if (type === 'module') {
                ytRow.classList.add('hidden');
                descRow.classList.add('hidden');
                pdfRow.classList.add('hidden');
                previewBox.classList.add('hidden');
                currYt.required = false;
                currDuration.required = false;
                
                document.getElementById('curriculum-modal-title').innerText = itemId ? "Edit Module" : "Add New Module";
            } else {
                ytRow.classList.remove('hidden');
                descRow.classList.remove('hidden');
                pdfRow.classList.remove('hidden');
                previewBox.classList.remove('hidden');
                currYt.required = true;
                currDuration.required = true;
                
                currYt.value = ytId;
                currDuration.value = duration || '';
                currDesc.value = desc;
                currPdf.value = pdfLink;
                currPreview.checked = isPreview;

                document.getElementById('curriculum-modal-title').innerText = itemId ? "Edit Lesson" : "Add Lesson to Module";
            }

            currModal.classList.remove('hidden');
            currModal.classList.add('flex');
        };

        const hideCurriculumModal = () => {
            currModal.classList.add('hidden');
            currModal.classList.remove('flex');
            currForm.reset();
        };

        closeCurrModal.onclick = hideCurriculumModal;
        cancelCurrBtn.onclick = hideCurriculumModal;

        document.getElementById('add-module-btn').onclick = () => {
            openCurriculumEditor('module', '', '', '', 1);
        };

        currForm.onsubmit = async (e) => {
            e.preventDefault();
            const type = currType.value;
            const itemId = currId.value;
            const courseId = currCourseId.value;
            const modId = currModuleId.value;
            const title = currTitle.value.trim();
            const order = parseInt(currOrder.value, 10);

            try {
                if (type === 'module') {
                    await window.FirebaseService.saveModule(courseId, itemId || null, { title, order });
                } else {
                    const youtubeId = currYt.value.trim();
                    const durationSeconds = parseInt(currDuration.value, 10);
                    const description = currDesc.value.trim();
                    const isPreview = currPreview.checked;
                    const pdfLink = currPdf.value.trim();

                    await window.FirebaseService.saveLesson(courseId, modId, itemId || null, {
                        title,
                        order,
                        youtubeId,
                        durationSeconds,
                        description,
                        isPreview,
                        pdfLink
                    });
                }
                hideCurriculumModal();
                renderCurriculumTree();
            } catch (error) {
                alert("Failed to save item: " + error.message);
            }
        };

        window.deleteCurriculumItem = async (type, itemId) => {
            if (confirm(`Are you sure you want to delete this ${type}? This action is irreversible.`)) {
                try {
                    if (type === 'module') {
                        await window.FirebaseService.deleteModule(activeCourseId, itemId);
                    } else {
                        await window.FirebaseService.deleteLesson(activeCourseId, itemId);
                    }
                    renderCurriculumTree();
                } catch (error) {
                    alert("Failed to delete item: " + error.message);
                }
            }
        };

        // Initialize Curriculum view on load
        loadCurriculumManager();
    </script>
</body>
</html>
