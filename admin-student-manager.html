<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Manager | PrepShare Admin</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        /* Custom scrollbar utility */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pl-64 transition-colors duration-300">

    <!-- Admin Sidebar Component -->
    <admin-sidebar></admin-sidebar>

    <!-- Main Workspace Content -->
    <main class="p-8 max-w-7xl mx-auto">
        <!-- Top Application Header -->
        <header class="flex justify-between items-center mb-10">
            <div class="space-y-1">
                <h1 class="font-headline-lg text-3xl font-extrabold tracking-tight text-primary">Global Student Directory</h1>
                <p class="text-sm text-on-surface-variant">Search all user profiles, apply deep filters, and manage bulk eradication.</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="px-3 py-1 rounded-full bg-error/10 text-error font-bold text-xs border border-error/20 flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">warning</span>
                    CAUTION: DESTRUCTIVE ACTIONS
                </span>
            </div>
        </header>

        <!-- Main Content -->
        <div class="w-full">
            <admin-student-manager></admin-student-manager>
        </div>
    </main>

    <!-- Core configurations and services -->
    <script src="js/config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-service.js"></script>
    <script src="js/components.js"></script>
    <script src="js/admin-student-manager.js"></script>
    <script src="js/main.js"></script>

    <script>
        // Check Admin Authorization
        (function() {
            const currentUser = window.FirebaseService.getCurrentUser();
            if (!currentUser || currentUser.role !== 'admin') {
                alert("Access Denied: Admin privileges are required to view the management console.");
                window.location.href = "index.html";
                return;
            }
        })();
    </script>
</body>
</html>
